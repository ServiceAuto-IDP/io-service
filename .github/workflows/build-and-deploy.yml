name: Build and Deploy Frontend

on:
  push:
    branches:
      - master
      - main

env:
  IMAGE_NAME: savupaul/serviceauto-io
  IMAGE_TAG: latest

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Windows, serviceauto]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        shell: powershell
        run: |
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build Docker image
        shell: powershell
        run: |
          docker build --pull -t "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" .

      - name: Push Docker image
        shell: powershell
        run: |
          docker push "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Trigger Portainer webhook
        shell: powershell
        run: |
          Invoke-WebRequest -Method POST -Uri "${{ secrets.PORTAINER_WEBHOOK_URL }}"
